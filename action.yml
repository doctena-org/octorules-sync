# action.yml
# https://help.github.com/en/actions/building-actions/metadata-syntax-for-github-actions
name: 'octorules-sync'
description: 'Run doctena-org/octorules to deploy your WAF rules config.'
inputs:
  config_path:
    description: 'Path, relative to your repository root, of the config file
                  you would like octorules to use.'
    required: false
    default: 'config.yaml'
  doit:
    description: 'Really do it? Set "--doit" to apply changes; Any other
                  string to only plan.'
    required: false
    default: ''
  force:
    description: 'Run octorules sync with --force to bypass safety thresholds?'
    required: false
    default: 'No'
  checksum:
    description: 'Pass a plan checksum to octorules sync for drift protection.
                  Only used when doit is "--doit".'
    required: false
    default: ''
  phases:
    description: 'Space separated list of rule phases to sync (e.g.
                  "cache_rules redirect_rules"). Leave empty for all phases.'
    required: false
    default: ''
  zones:
    description: 'Space separated list of zones to sync, leave empty to sync
                  all zones in the config file.'
    required: false
    default: ''
  lint:
    description: 'Run octorules lint before plan/sync? Set "Yes" to enable.'
    required: false
    default: 'No'
  lint_severity:
    description: 'Minimum lint severity: "error", "warning", or "info".'
    required: false
    default: 'warning'
  lint_plan:
    description: 'Cloudflare plan tier for lint entitlement checks (e.g. "free",
                  "enterprise"). Defaults to "enterprise". Other providers ignore this.'
    required: false
    default: ''
  audit:
    description: 'Run octorules audit (IP overlap, CDN range checks) before plan/sync?
                  Set "Yes" to enable.'
    required: false
    default: 'No'
  audit_checks:
    description: 'Space separated list of audit checks to run (e.g.
                  "ip-overlap cdn-ranges"). Leave empty for all checks.'
    required: false
    default: ''
  audit_severity:
    description: 'Minimum audit severity: "error", "warning", or "info".'
    required: false
    default: 'warning'
  audit_log:
    description: 'Path to write a JSON-lines audit log of sync results. Empty = disabled.'
    required: false
    default: ''
  add_pr_comment:
    description: 'Add plan as a comment, when triggered by a pull request?'
    required: false
    default: 'No'
  pr_comment_token:
    description: 'Provide a token to use, if you set add_pr_comment to Yes.'
    required: false
    default: ''
outputs:
  log:
    description: '`octorules` command output'
    value: ${{ steps.run.outputs.log }}
  plan:
    description: 'Planned changes from octorules'
    value: ${{ steps.run.outputs.plan }}
  exit_code:
    description: 'The exit code from octorules. For plan: 0 = no changes,
                  2 = changes detected, 1 = error. For sync: 0 = success,
                  1 = error.'
    value: ${{ steps.run.outputs.exit_code }}
  checksum:
    description: 'SHA-256 plan checksum for drift protection (plan mode only).'
    value: ${{ steps.run.outputs.checksum }}
  lint_exit_code:
    description: 'Exit code from octorules lint: 0 = clean, 1 = errors,
                  2 = warnings only, empty = lint disabled.'
    value: ${{ steps.lint.outputs.lint_exit_code }}
  lint_results:
    description: 'Lint results text. Empty when disabled or clean.'
    value: ${{ steps.lint.outputs.lint_results }}
  audit_exit_code:
    description: 'Exit code from octorules audit: 0 = clean, 1 = errors,
                  2 = warnings only, empty = audit disabled.'
    value: ${{ steps.audit.outputs.audit_exit_code }}
  audit_results:
    description: 'Audit results text. Empty when disabled or clean.'
    value: ${{ steps.audit.outputs.audit_results }}

runs:
  using: 'composite'
  steps:
    - name: Lint octorules config
      id: lint
      env:
        LINT: ${{ inputs.lint }}
        CONFIG_PATH: ${{ inputs.config_path }}
        LINT_SEVERITY: ${{ inputs.lint_severity }}
        LINT_PLAN: ${{ inputs.lint_plan }}
        PHASES: ${{ inputs.phases }}
        ZONES: ${{ inputs.zones }}
      run: ${GITHUB_ACTION_PATH}/scripts/lint.sh
      shell: bash
      working-directory: ${{ github.workspace }}
    - name: Audit octorules rules
      id: audit
      env:
        AUDIT: ${{ inputs.audit }}
        CONFIG_PATH: ${{ inputs.config_path }}
        AUDIT_CHECKS: ${{ inputs.audit_checks }}
        AUDIT_SEVERITY: ${{ inputs.audit_severity }}
        PHASES: ${{ inputs.phases }}
        ZONES: ${{ inputs.zones }}
      run: ${GITHUB_ACTION_PATH}/scripts/audit.sh
      shell: bash
      working-directory: ${{ github.workspace }}
    - name: Run octorules
      id: run
      # Run unless sync mode AND lint or audit found blocking issues.
      # Plan mode always runs.  Sync mode proceeds only when:
      #   - lint is clean (0), warnings-only (2), or disabled ('')
      #   - AND audit is clean (0), warnings-only (2), or disabled ('')
      if: >-
        inputs.doit != '--doit'
        || (
          (steps.lint.outputs.lint_exit_code == ''
           || steps.lint.outputs.lint_exit_code == '0'
           || steps.lint.outputs.lint_exit_code == '2')
          && (steps.audit.outputs.audit_exit_code == ''
              || steps.audit.outputs.audit_exit_code == '0'
              || steps.audit.outputs.audit_exit_code == '2')
        )
      env:
        CONFIG_PATH: ${{ inputs.config_path }}
        DOIT: ${{ inputs.doit }}
        FORCE: ${{ inputs.force }}
        CHECKSUM: ${{ inputs.checksum }}
        PHASES: ${{ inputs.phases }}
        ZONES: ${{ inputs.zones }}
        AUDIT_LOG: ${{ inputs.audit_log }}
      run: ${GITHUB_ACTION_PATH}/scripts/run.sh
      shell: bash
      working-directory: ${{ github.workspace }}
    - name: Add pull request comment
      id: comment
      if: ${{ !cancelled() }}
      env:
        ADD_PR_COMMENT: ${{ inputs.add_pr_comment }}
        PR_COMMENT_TOKEN: ${{ inputs.pr_comment_token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        LINT_EXIT_CODE: ${{ steps.lint.outputs.lint_exit_code }}
        AUDIT_EXIT_CODE: ${{ steps.audit.outputs.audit_exit_code }}
      run: ${GITHUB_ACTION_PATH}/scripts/comment.sh
      shell: bash
      working-directory: ${{ github.workspace }}
    - name: Fail on lint errors
      if: ${{ !cancelled() && inputs.lint == 'Yes' && steps.lint.outputs.lint_exit_code == '1' }}
      run: |
        echo "FAIL: octorules lint found errors. See lint results above."
        exit 1
      shell: bash
    - name: Fail on audit errors
      if: ${{ !cancelled() && inputs.audit == 'Yes' && steps.audit.outputs.audit_exit_code == '1' }}
      run: |
        echo "FAIL: octorules audit found errors. See audit results above."
        exit 1
      shell: bash
branding:
  icon: 'shield'
  color: 'orange'
