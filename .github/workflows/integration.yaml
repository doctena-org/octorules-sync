---
name: Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration:
    name: End-to-end action test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create mock octorules binary
        run: |
          mkdir -p "${{ runner.temp }}/bin"
          cat > "${{ runner.temp }}/bin/octorules" <<'MOCK'
          #!/bin/bash
          # Mock octorules for integration testing.
          # plan mode: emit a checksum on stderr, plan on stdout.
          if [[ "$*" == *"plan"* ]]; then
            echo "checksum=abc123def456" >&2
            echo "No changes detected."
            exit 0
          fi
          # lint mode: clean exit.
          if [[ "$*" == *"lint"* ]]; then
            exit 0
          fi
          exit 0
          MOCK
          chmod +x "${{ runner.temp }}/bin/octorules"
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: Create minimal config
        run: |
          cat > config.yaml <<'EOF'
          providers:
            cloudflare:
              token: env/CLOUDFLARE_API_TOKEN
            rules:
              directory: ./rules
          zones:
            test.example.com:
              sources:
                - rules
          EOF
          mkdir -p rules
          echo '---' > rules/test.example.com.yaml

      - name: Run action in plan mode
        id: octorules
        uses: ./
        with:
          config_path: config.yaml
        env:
          CLOUDFLARE_API_TOKEN: fake-token-for-test

      - name: Verify outputs exist
        run: |
          echo "exit_code=${{ steps.octorules.outputs.exit_code }}"
          echo "checksum=${{ steps.octorules.outputs.checksum }}"
          test -n "${{ steps.octorules.outputs.exit_code }}"
          test -f "${GITHUB_WORKSPACE}/octorules-sync.plan"
          test -f "${GITHUB_WORKSPACE}/octorules-sync.log"

  integration-exit-code-2:
    name: Plan with changes detected (exit 2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create mock octorules that exits 2
        run: |
          mkdir -p "${{ runner.temp }}/bin"
          cat > "${{ runner.temp }}/bin/octorules" <<'MOCK'
          #!/bin/bash
          if [[ "$*" == *"plan"* ]]; then
            echo "checksum=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789" >&2
            echo "zone: example.com"
            echo "  cache_rules: 2 create, 1 update"
            exit 2
          fi
          if [[ "$*" == *"lint"* ]]; then
            exit 0
          fi
          exit 0
          MOCK
          chmod +x "${{ runner.temp }}/bin/octorules"
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: Create minimal config
        run: |
          cat > config.yaml <<'EOF'
          providers:
            cloudflare:
              token: env/CLOUDFLARE_API_TOKEN
            rules:
              directory: ./rules
          zones:
            test.example.com:
              sources:
                - rules
          EOF
          mkdir -p rules
          echo '---' > rules/test.example.com.yaml

      - name: Run action in plan mode (exit 2)
        id: octorules
        uses: ./
        with:
          config_path: config.yaml
        env:
          CLOUDFLARE_API_TOKEN: fake-token-for-test

      - name: Verify exit code 2 and checksum
        run: |
          test "${{ steps.octorules.outputs.exit_code }}" = "2"
          test -n "${{ steps.octorules.outputs.checksum }}"

  integration-lint-errors:
    name: Lint errors block sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create mock octorules with lint errors
        run: |
          mkdir -p "${{ runner.temp }}/bin"
          cat > "${{ runner.temp }}/bin/octorules" <<'MOCK'
          #!/bin/bash
          if [[ "$*" == *"lint"* ]]; then
            echo "E001: Missing required field 'action'"
            exit 1
          fi
          # sync/plan should not be reached when lint blocks
          echo "UNEXPECTED: sync/plan ran despite lint errors" >&2
          exit 0
          MOCK
          chmod +x "${{ runner.temp }}/bin/octorules"
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: Create minimal config
        run: |
          cat > config.yaml <<'EOF'
          providers:
            cloudflare:
              token: env/CLOUDFLARE_API_TOKEN
            rules:
              directory: ./rules
          zones:
            test.example.com:
              sources:
                - rules
          EOF
          mkdir -p rules
          echo '---' > rules/test.example.com.yaml

      - name: Run action with lint enabled (expect failure)
        id: octorules
        uses: ./
        continue-on-error: true
        with:
          config_path: config.yaml
          doit: '--doit'
          lint: 'Yes'
        env:
          CLOUDFLARE_API_TOKEN: fake-token-for-test

      - name: Verify action failed due to lint errors
        run: |
          test "${{ steps.octorules.outcome }}" = "failure"
          test "${{ steps.octorules.outputs.lint_exit_code }}" = "1"

  integration-audit-findings:
    name: Audit findings block sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create mock octorules with audit findings
        run: |
          mkdir -p "${{ runner.temp }}/bin"
          cat > "${{ runner.temp }}/bin/octorules" <<'MOCK'
          #!/bin/bash
          if [[ "$*" == *"audit"* ]]; then
            echo "ip-overlap: 10.0.0.0/8 overlaps in rules block_internal and allow_vpn"
            echo "cdn-ranges: stale Cloudflare IP ranges detected"
            exit 1
          fi
          if [[ "$*" == *"lint"* ]]; then
            exit 0
          fi
          # sync/plan should not be reached when audit blocks
          echo "UNEXPECTED: sync/plan ran despite audit findings" >&2
          exit 0
          MOCK
          chmod +x "${{ runner.temp }}/bin/octorules"
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: Create minimal config
        run: |
          cat > config.yaml <<'EOF'
          providers:
            cloudflare:
              token: env/CLOUDFLARE_API_TOKEN
            rules:
              directory: ./rules
          zones:
            test.example.com:
              sources:
                - rules
          EOF
          mkdir -p rules
          echo '---' > rules/test.example.com.yaml

      - name: Run action with audit enabled (expect failure)
        id: octorules
        uses: ./
        continue-on-error: true
        with:
          config_path: config.yaml
          doit: '--doit'
          audit: 'Yes'
        env:
          CLOUDFLARE_API_TOKEN: fake-token-for-test

      - name: Verify action failed due to audit findings
        run: |
          test "${{ steps.octorules.outcome }}" = "failure"
          test "${{ steps.octorules.outputs.audit_exit_code }}" = "1"

  integration-audit-warnings-allow-sync:
    name: Audit warnings do not block sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create mock octorules with audit warnings
        run: |
          mkdir -p "${{ runner.temp }}/bin"
          cat > "${{ runner.temp }}/bin/octorules" <<'MOCK'
          #!/bin/bash
          if [[ "$*" == *"audit"* ]]; then
            echo "cdn-ranges: Cloudflare IP ranges may be stale (warning)"
            exit 2
          fi
          if [[ "$*" == *"lint"* ]]; then
            exit 0
          fi
          if [[ "$*" == *"plan"* ]]; then
            echo "checksum=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789" >&2
            echo "zone: test.example.com"
            echo "  cache_rules: 1 create"
            exit 0
          fi
          exit 0
          MOCK
          chmod +x "${{ runner.temp }}/bin/octorules"
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: Create minimal config
        run: |
          cat > config.yaml <<'EOF'
          providers:
            cloudflare:
              token: env/CLOUDFLARE_API_TOKEN
            rules:
              directory: ./rules
          zones:
            test.example.com:
              sources:
                - rules
          EOF
          mkdir -p rules
          echo '---' > rules/test.example.com.yaml

      - name: Run action with audit enabled (expect success despite warnings)
        id: octorules
        uses: ./
        continue-on-error: true
        with:
          config_path: config.yaml
          doit: '--doit'
          audit: 'Yes'
          lint: 'Yes'
        env:
          CLOUDFLARE_API_TOKEN: fake-token-for-test

      - name: Verify action succeeded (warnings do not block sync)
        run: |
          echo "outcome=${{ steps.octorules.outcome }}"
          echo "audit_exit_code=${{ steps.octorules.outputs.audit_exit_code }}"
          test "${{ steps.octorules.outcome }}" = "success"
          test "${{ steps.octorules.outputs.audit_exit_code }}" = "2"
          test -f "${GITHUB_WORKSPACE}/octorules-sync.plan"

  integration-pr-comment:
    name: PR comment creation (PR context only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create mock octorules binary
        run: |
          mkdir -p "${{ runner.temp }}/bin"
          cat > "${{ runner.temp }}/bin/octorules" <<'MOCK'
          #!/bin/bash
          if [[ "$*" == *"plan"* ]]; then
            echo "checksum=abcd1234abcd1234abcd1234abcd1234abcd1234abcd1234abcd1234abcd1234" >&2
            echo "Zone: test.example.com"
            echo "  + new_rule (create)"
          fi
          exit 0
          MOCK
          chmod +x "${{ runner.temp }}/bin/octorules"
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: Create test config
        run: |
          cat > config.yaml <<'EOF'
          providers:
            cloudflare:
              token: fake
            rules:
              directory: ./rules
          zones:
            test.example.com:
              sources:
                - rules
          EOF
          mkdir -p rules
          echo '---' > rules/test.example.com.yaml

      - name: Run action with PR comment enabled
        id: octorules
        uses: ./
        with:
          config_path: config.yaml
          add_pr_comment: 'Yes'
          pr_comment_token: ${{ github.token }}
        env:
          CLOUDFLARE_API_TOKEN: fake-token-for-test

      - name: Verify comment was created on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch PR comments and look for the octorules marker
          pr_num="${{ github.event.pull_request.number }}"
          repo="${{ github.repository }}"
          comments="$(gh api "repos/${repo}/issues/${pr_num}/comments" --jq '.[].body')"
          if echo "${comments}" | grep -q "octorules-sync-plan"; then
            echo "PASS: PR comment with octorules marker found"
          else
            echo "FAIL: No PR comment with octorules marker found"
            echo "Comments found:"
            echo "${comments}" | head -20
            exit 1
          fi
