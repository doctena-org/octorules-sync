---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "${TAG}" --generate-notes

      - name: Update major version tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          major="${TAG%%.*}"
          git tag -f "${major}" "${TAG}"
          git push -f origin "${major}"
