---
name: Update Major Version Tag

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-major-tag:
    name: Update Major Version Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update major version tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          major="${TAG%%.*}"
          git tag -f "${major}" "${TAG}"
          git push -f origin "${major}"
