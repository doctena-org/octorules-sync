---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  release:
    needs: [ci]
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Tag '${TAG}' does not match semver format vX.Y.Z"
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "${TAG}" --generate-notes

      - name: Update major version tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          major="${TAG%%.*}"
          if ! [[ "${major}" =~ ^v[0-9]+$ ]]; then
            echo "ERROR: Invalid major version tag: ${major}"
            exit 1
          fi
          git tag -f "${major}" "${TAG}"
          git push -f origin "${major}"
